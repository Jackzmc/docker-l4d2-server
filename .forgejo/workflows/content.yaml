on: 
  workflow_dispatch:
  push:
    paths:
      - .forgejo/contentyaml
      - content/*
    
env:
  # Image name
  image: srcds-l4d2
  tag: ${{ forgejo.ref_name }}
  user: jackz
  registry: git.jackz.me
  APPID: 222860

jobs:
  content:
    runs-on: ubuntu-full
    steps:
      - name: Login to Container Registry
        uses: https://git.jackz.me/actions/docker-login-action@v3
        with:
          registry: ${{ env.registry }}
          username: ${{ env.user }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Set up Docker Buildx
        uses: https://git.jackz.me/actions/docker-setup-buildx-action@v3
      - name: Build and push
        uses: https://git.jackz.me/actions/docker-build-push-action@v6
        with:
          file: content/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.registry }}/${{ env.user }}/${{ env.image }}-content:latest
          cache-from: type=registry,ref=${{ env.registry }}/${{ env.user }}/${{ env.image }}-content:buildcache
          cache-to: type=registry,ref=${{ env.registry }}/${{ env.user }}/${{ env.image }}-content:buildcache,mode=max